<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>27aDay — Image Review</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.6/dist/umd/supabase.min.js" integrity="sha384-GyhLKJoRcMXYwIJUTyx0/uSPYliVPdRYYXJm3G6zyMjKShNs8jLM7WaLpk8Vr4W/" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8F7F4; color: #0A2F1F; }
  header { position: sticky; top: 0; z-index: 10; background: #F8F7F4; border-bottom: 1px solid #e5e2da; padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  header h1 { font-size: 18px; }
  header .meta { font-size: 13px; color: #666; flex: 1; }
  button { cursor: pointer; border: none; border-radius: 8px; font-weight: 600; }
  .pagebtn { background: #1B3A2A; color: #fff; padding: 8px 14px; font-size: 13px; }
  .pagebtn:disabled { opacity: .35; cursor: default; }
  .signout { background: none; color: #999; font-size: 12px; text-decoration: underline; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; padding: 16px; max-width: 1500px; margin: 0 auto; }
  .card { background: #fff; border: 1px solid #e5e2da; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
  .card.done { opacity: .55; }
  .imgwrap { aspect-ratio: 1; background: #fff; position: relative; }
  .imgwrap img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
  .disc { position: absolute; top: 8px; right: 8px; background: #C11230; color: #fff; font-size: 12px; font-weight: 700; padding: 3px 8px; border-radius: 999px; }
  .verdict { position: absolute; top: 8px; left: 8px; color: #fff; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px; max-width: 85%; }
  .v-approve { background: #2D6A4F; } .v-regenerate { background: #C11230; } .v-pass, .v-reject { background: #777; }
  .body { padding: 10px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .brand { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: #888; }
  .title { font-size: 13px; line-height: 1.3; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 34px; }
  .price { font-size: 14px; font-weight: 700; }
  .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-top: auto; }
  .actions button { padding: 7px 2px; font-size: 11.5px; color: #fff; }
  .b-approve { background: #2D6A4F; } .b-regen { background: #C11230; }
  .b-pass { background: #fff; color: #555 !important; border: 1px solid #ccc; }
  .reasons { display: flex; flex-direction: column; gap: 4px; margin-top: auto; }
  .reasons button { padding: 7px 8px; font-size: 11.5px; text-align: left; background: #fff; color: #C11230; border: 1px solid #C11230; }
  .reasons button:hover { background: #C11230; color: #fff; }
  .reasons .cancel { border-color: #ccc; color: #888; }
  #login { max-width: 360px; margin: 12vh auto; background: #fff; border: 1px solid #e5e2da; border-radius: 16px; padding: 28px; display: flex; flex-direction: column; gap: 12px; }
  #login input { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
  #login button { background: #1B3A2A; color: #fff; padding: 12px; font-size: 15px; }
  #login .err { color: #C11230; font-size: 13px; min-height: 16px; }
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #0A2F1F; color: #fff; padding: 10px 18px; border-radius: 999px; font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
const SB_URL = 'https://klcbwdwnasezfbvxdmgh.supabase.co';
const SB_KEY = 'sb_publishable_FtWC6pXNlrxUwbmR3czb3Q_cWkAPSCx';
const PAGE_SIZE = 100;
const REASONS = [
  ['wrong-product', 'Product not accurate'],
  ['logo-distorted', 'Logo distorted'],
  ['needs-chip-highlands', 'Chip / Highlands scene'],
];
const sb = supabase.createClient(SB_URL, SB_KEY);
const app = document.getElementById('app');
let page = 0, total = 0, reviewed = 0, dealsOnly = true;

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 2200);
}
function esc(s) { return (s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function showLogin() {
  app.innerHTML = `
    <form id="login">
      <h1>27aDay Image Review</h1>
      <input type="email" id="email" placeholder="Email" autocomplete="username" required>
      <input type="password" id="pw" placeholder="Password" autocomplete="current-password" required>
      <div class="err" id="err"></div>
      <button type="submit">Sign in</button>
    </form>`;
  document.getElementById('login').onsubmit = async (e) => {
    e.preventDefault();
    const { error } = await sb.auth.signInWithPassword({
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('pw').value,
    });
    if (error) { document.getElementById('err').textContent = error.message; return; }
    main();
  };
}

async function decide(card, p, decision, tags) {
  const { error } = await sb.from('image_review_feedback').insert({
    asset_id: p.id, asset_kind: 'product', scope_type: 'asset', scope_key: p.id,
    product_key: p.id, category: p.category_slug, decision, issue_tags: tags,
  });
  if (error) { toast('Save failed: ' + error.message); return; }
  reviewed++;
  document.getElementById('count').textContent = reviewed + ' reviewed this session';
  markCard(card, { decision, issue_tags: tags });
}

function markCard(card, v) {
  card.classList.add('done');
  card.querySelector('.verdict')?.remove();
  const b = document.createElement('div');
  b.className = 'verdict v-' + v.decision;
  b.textContent = v.decision + (v.issue_tags && v.issue_tags.length ? ': ' + v.issue_tags.join(', ') : '');
  card.querySelector('.imgwrap').appendChild(b);
  const act = card.querySelector('.actions, .reasons');
  if (act) act.style.visibility = 'hidden';
  setTimeout(() => { if (act) act.style.visibility = ''; card.querySelectorAll('.reasons').forEach(r => swapActions(card, cardProduct(card))); }, 0);
}

const productByCard = new WeakMap();
function cardProduct(card) { return productByCard.get(card); }

function actionButtons(card, p) {
  const d = document.createElement('div');
  d.className = 'actions';
  d.innerHTML = `<button class="b-approve">Approve</button><button class="b-regen">Regen</button><button class="b-pass">Pass</button>`;
  d.querySelector('.b-approve').onclick = () => decide(card, p, 'approve', []);
  d.querySelector('.b-pass').onclick = () => decide(card, p, 'pass', []);
  d.querySelector('.b-regen').onclick = () => {
    const r = document.createElement('div');
    r.className = 'reasons';
    for (const [tag, label] of REASONS) {
      const b = document.createElement('button');
      b.textContent = label;
      b.onclick = () => decide(card, p, 'regenerate', [tag]);
      r.appendChild(b);
    }
    const c = document.createElement('button');
    c.className = 'cancel'; c.textContent = 'Cancel';
    c.onclick = () => swapActions(card, p);
    r.appendChild(c);
    d.replaceWith(r);
  };
  return d;
}
function swapActions(card, p) {
  const cur = card.querySelector('.actions, .reasons');
  if (cur) cur.replaceWith(actionButtons(card, p));
}

async function loadPage() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '<p style="padding:20px">Loading…</p>';
  let q = sb.from('products_seller_rank')
    .select('id, title, brand, price, original_price, effective_discount_pct, image_url, category_slug', { count: page === 0 && !total ? 'exact' : undefined })
    .eq('is_active', true).eq('is_junk', false).not('image_url', 'is', null);
  if (dealsOnly) q = q.gte('effective_discount_pct', 5);
  q = q.order('seller_rank', { ascending: false }).order('price', { ascending: false }).order('id')
    .range(page * PAGE_SIZE, page * PAGE_SIZE + PAGE_SIZE - 1);
  const { data, count, error } = await q;
  if (error) { grid.innerHTML = '<p style="padding:20px;color:#C11230">' + esc(error.message) + '</p>'; return; }
  if (count != null) total = count;
  document.getElementById('pageinfo').textContent = 'Page ' + (page + 1) + ' of ' + Math.max(1, Math.ceil(total / PAGE_SIZE)) + ' · ' + total + ' products';
  document.getElementById('prev').disabled = page === 0;
  document.getElementById('next').disabled = (page + 1) * PAGE_SIZE >= total;

  const ids = data.map(p => p.id);
  const { data: fb } = await sb.from('image_review_feedback')
    .select('asset_id, decision, issue_tags, created_at')
    .in('asset_id', ids).eq('asset_kind', 'product')
    .order('created_at', { ascending: false });
  const verdicts = {};
  for (const row of fb || []) if (!verdicts[row.asset_id]) verdicts[row.asset_id] = row;

  grid.innerHTML = '';
  for (const p of data) {
    const card = document.createElement('div');
    card.className = 'card';
    productByCard.set(card, p);
    card.innerHTML = `
      <div class="imgwrap">
        <img loading="lazy" src="${esc(p.image_url)}" alt="" onerror="this.style.display='none'">
        ${(p.effective_discount_pct || 0) >= 1 ? '<div class="disc">-' + p.effective_discount_pct + '%</div>' : ''}
      </div>
      <div class="body">
        <div class="brand">${esc(p.brand) || '—'}</div>
        <div class="title">${esc(p.title)}</div>
        <div class="price">${p.price != null ? '$' + Number(p.price).toFixed(2) : ''}
          ${p.original_price > p.price ? '<s style="color:#aaa;font-weight:400;font-size:12px"> $' + Number(p.original_price).toFixed(2) + '</s>' : ''}
          ${(p.effective_discount_pct || 0) < 1 ? '<span style="color:#aaa;font-weight:400;font-size:11px"> full price</span>' : ''}
        </div>
      </div>`;
    card.querySelector('.body').appendChild(actionButtons(card, p));
    if (verdicts[p.id]) markCard(card, verdicts[p.id]);
    grid.appendChild(card);
  }
  window.scrollTo(0, 0);
}

// ── Generated image review (character composites) ──────────────────────
const CHAR_THUMBS = {
  chip: 'https://d2ol7oe51mr4n9.cloudfront.net/user_3ArXUyeaxx0D1BX4NJCs3ye5z4B/1db32124-1926-4a12-96d8-f21ca6c0a721.png',
  dec: 'https://d2ol7oe51mr4n9.cloudfront.net/user_3ArXUyeaxx0D1BX4NJCs3ye5z4B/1e49d768-af3b-44c0-87b5-dbafc1e291b4.png',
  niall: 'https://d2ol7oe51mr4n9.cloudfront.net/user_3ArXUyeaxx0D1BX4NJCs3ye5z4B/03918b1d-56ec-487e-981a-8aff6365b216.png',
  seamus: 'https://d2ol7oe51mr4n9.cloudfront.net/user_3ArXUyeaxx0D1BX4NJCs3ye5z4B/13ccb2c5-9998-4f72-a550-a62d4a068fca.png',
  fiona: 'https://d2ol7oe51mr4n9.cloudfront.net/user_3ArXUyeaxx0D1BX4NJCs3ye5z4B/477646d4-ab20-49f2-a227-796236181f77.png',
  aoife: 'https://d2ol7oe51mr4n9.cloudfront.net/user_3ArXUyeaxx0D1BX4NJCs3ye5z4B/0e19ecda-9947-47f6-94a9-ffc0f6d50d41.png',
};
const REDO_REASONS = ['Not natural', 'Product wrong', 'Background fake', 'Too polished'];

async function saveGen(card, g, status, redoReason) {
  const comment = card.querySelector('.gencomment').value.trim() || null;
  const { error } = await sb.from('generated_images')
    .update({ status, redo_reason: redoReason || null, comment, reviewed_at: new Date().toISOString() })
    .eq('id', g.id);
  if (error) { toast('Save failed: ' + error.message); return; }
  reviewed++;
  document.getElementById('count').textContent = reviewed + ' reviewed this session';
  const b = card.querySelector('.genstatus');
  b.textContent = status + (redoReason ? ': ' + redoReason : '');
  b.className = 'verdict genstatus ' + (status === 'approved' ? 'v-approve' : status === 'redo' ? 'v-regenerate' : 'v-pass');
  card.classList.add('done');
  toast('Saved: ' + status);
}

async function loadGenerated() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '<p style="padding:20px">Loading…</p>';
  const { data, error } = await sb.from('generated_images')
    .select('id, character_slug, image_url, status, redo_reason, comment, products(title, brand, price, original_price, image_url, source_site, commission_percentage)')
    .order('created_at', { ascending: true });
  if (error) { grid.innerHTML = '<p style="padding:20px;color:#C11230">' + esc(error.message) + '</p>'; return; }
  document.getElementById('pageinfo').textContent = (data || []).length + ' generated images · ' +
    (data || []).filter(g => g.status !== 'pending').length + ' reviewed';
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(340px, 1fr))';
  for (const g of data || []) {
    const p = g.products || {};
    const disc = p.original_price > p.price ? Math.round((p.original_price - p.price) / p.original_price * 100) : 0;
    const card = document.createElement('div');
    card.className = 'card' + (g.status !== 'pending' ? ' done' : '');
    card.innerHTML = `
      <div class="imgwrap" style="aspect-ratio:3/4">
        <img loading="lazy" src="${esc(g.image_url)}" alt="" style="object-fit:cover;padding:0">
        <div style="position:absolute;top:8px;right:8px;display:flex;gap:5px">
          <img src="${esc(p.image_url ? p.image_url.split(',')[0] : '')}" style="width:52px;height:52px;object-fit:contain;background:#fff;border-radius:8px;border:1px solid #ddd">
          <img src="${esc(CHAR_THUMBS[g.character_slug] || '')}" style="width:52px;height:52px;object-fit:cover;border-radius:8px;border:1px solid #ddd">
        </div>
        <div class="verdict genstatus ${g.status === 'approved' ? 'v-approve' : g.status === 'redo' ? 'v-regenerate' : g.status === 'pending' ? '' : 'v-pass'}"
          ${g.status === 'pending' ? 'style="display:none"' : ''}>${esc(g.status)}${g.redo_reason ? ': ' + esc(g.redo_reason) : ''}</div>
      </div>
      <div class="body">
        <div class="brand">${esc(p.brand) || '—'} · ${esc(g.character_slug)}</div>
        <div class="title">${esc(p.title || '')}</div>
        <div style="font-size:12px;color:#666;line-height:1.5">
          Partner: <b>${esc(p.source_site || 'affiliate feed')}</b> · Commission: <b>${p.commission_percentage != null ? Number(p.commission_percentage).toFixed(1) + '%' : '—'}</b><br>
          ${p.original_price ? 'Normal: <s>$' + Number(p.original_price).toFixed(2) + '</s> · ' : ''}Sale: <b>$${p.price != null ? Number(p.price).toFixed(2) : '—'}</b>
          ${disc >= 1 ? ' · <span style="color:#C11230;font-weight:700">-' + disc + '%</span>' : ''}
        </div>
        <input class="gencomment" placeholder="Comment (optional)" value="${esc(g.comment || '')}"
          style="padding:8px;border:1px solid #ddd;border-radius:8px;font-size:13px">
        <div class="actions" style="grid-template-columns:1fr 1fr 1fr">
          <button class="b-approve">Approve</button>
          <button class="b-regen">Redo</button>
          <button class="b-pass">Reject</button>
        </div>
      </div>`;
    card.querySelector('.b-approve').onclick = () => saveGen(card, g, 'approved');
    card.querySelector('.b-pass').onclick = () => saveGen(card, g, 'rejected');
    card.querySelector('.b-regen').onclick = () => {
      const act = card.querySelector('.actions');
      const r = document.createElement('div');
      r.className = 'reasons';
      for (const label of REDO_REASONS) {
        const b = document.createElement('button');
        b.textContent = label;
        b.onclick = () => { saveGen(card, g, 'redo', label); r.replaceWith(act); };
        r.appendChild(b);
      }
      const c = document.createElement('button');
      c.className = 'cancel'; c.textContent = 'Cancel';
      c.onclick = () => r.replaceWith(act);
      r.appendChild(c);
      act.replaceWith(r);
    };
    grid.appendChild(card);
  }
  window.scrollTo(0, 0);
}

let mode = new URLSearchParams(location.search).get('tab') === 'generated' ? 'generated' : 'products';

async function main() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { showLogin(); return; }
  app.innerHTML = `
    <header>
      <h1>Image Review</h1>
      <div style="display:flex;gap:2px;background:#e8e5de;border-radius:999px;padding:3px">
        <button class="pagebtn" id="tab-products" style="border-radius:999px">Products</button>
        <button class="pagebtn" id="tab-generated" style="border-radius:999px">Generated</button>
      </div>
      <span class="meta"><span id="pageinfo">Loading…</span> · <span id="count">0 reviewed this session</span></span>
      <label id="dealslabel" style="font-size:13px;display:flex;align-items:center;gap:5px;font-weight:600">
        <input type="checkbox" id="dealsonly" checked> Deals only (5%+ off)
      </label>
      <button class="pagebtn" id="prev">← Prev</button>
      <button class="pagebtn" id="next">Next →</button>
      <button class="signout" id="signout">sign out</button>
    </header>
    <div id="grid"></div>
    <div style="display:flex;justify-content:center;gap:10px;padding:20px">
      <button class="pagebtn" id="prev2">← Prev</button>
      <button class="pagebtn" id="next2">Next →</button>
    </div>`;
  const go = d => () => { page += d; loadPage(); syncPagers(); };
  const syncPagers = () => {
    document.getElementById('prev2').disabled = document.getElementById('prev').disabled;
    document.getElementById('next2').disabled = document.getElementById('next').disabled;
  };
  const applyMode = async () => {
    const gen = mode === 'generated';
    document.getElementById('tab-products').style.opacity = gen ? .45 : 1;
    document.getElementById('tab-generated').style.opacity = gen ? 1 : .45;
    document.getElementById('dealslabel').style.display = gen ? 'none' : 'flex';
    for (const id of ['prev', 'next', 'prev2', 'next2'])
      document.getElementById(id).style.display = gen ? 'none' : '';
    document.getElementById('grid').style.gridTemplateColumns = '';
    if (gen) await loadGenerated(); else { await loadPage(); syncPagers(); }
  };
  document.getElementById('tab-products').onclick = () => { mode = 'products'; applyMode(); };
  document.getElementById('tab-generated').onclick = () => { mode = 'generated'; applyMode(); };
  document.getElementById('prev').onclick = go(-1);
  document.getElementById('next').onclick = go(1);
  document.getElementById('prev2').onclick = go(-1);
  document.getElementById('next2').onclick = go(1);
  document.getElementById('signout').onclick = async () => { await sb.auth.signOut(); showLogin(); };
  document.getElementById('dealsonly').onchange = async (e) => {
    dealsOnly = e.target.checked; page = 0; total = 0;
    await loadPage(); syncPagers();
  };
  await applyMode();
}
main();
</script>
</body>
</html>
